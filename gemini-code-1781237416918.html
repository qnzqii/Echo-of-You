<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are — Pure 3D Roller (Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: #FAFAFA; /* 温暖的燕麦白 */
            color: #1A1A1A;
            min-height: 100vh;
            display: flex;
            align-items: center;     /* 垂直居中 */
            justify-content: center;  /* 水平居中 */
            padding: 20px;
            overflow: hidden;
        }

        /* 核心布局容器 */
        .main-container {
            display: flex;
            flex-direction: row;     
            align-items: center;     
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            font-size: clamp(1.4rem, 3.6vw, 2.6rem); /* 保持你最满意的黄金字号 */
            line-height: 1.2;
        }

        /* 左侧固定锚点：微调占比与间距，增强整体呼吸感 */
        .fixed-text {
            width: 28%; /* 🔒 修正：收紧左侧，为右侧 3D 形变让出更宽广的横向舞台 */
            text-align: right;
            font-weight: 500;
            padding-right: 6%; /* 增加右侧间距，形成天然的安全隔离带 */      
            white-space: nowrap;     
        }

        /* 右侧 3D 滚轴可视窗口 */
        .scroll-window {
            width: 72%; /* 🔒 修正：扩大右侧容器占比 */
            text-align: left;
            position: relative;
            
            /* 🔮 终极 Bug 修复：将 overflow 从 hidden 改为 visible！
               配合真 3D 视界，允许旋转换行后的文字头部自由向左伸展，彻底根治左侧被切掉的惨剧。
               因为我们有下方的 mask-image 控制上下淡出，所以左右放行完全不影响视觉完整性。
            */
            overflow: visible; 
            
            height: 8.2em; /* 严格保持你最满意的 5 行完美呈现高度 */          
            display: flex;
            align-items: center;
            
            /* 开启真 3D 空间硬件加速透视 */
            perspective: 1200px;
            perspective-origin: left center; /* 透视原点靠左，确保并排时的中轴线完美贴合 */

            /* 上下边缘消散遮罩，还原 iPhone 闹钟边缘若隐若现的高级隐没感 */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        /* 滚轴总轨道 */
        .scrolling-track {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: absolute;
            left: 0;
            top: 50%; /* 锁死在窗口垂直中心点 */
            transform-style: preserve-3d; /* 激活子元素的真 3D 空间渲染 */
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        /* 滚轴单行容器 */
        .scrolling-item {
            width: 100%;
            height: 1.6em; /* 严格固定每行高度，杜绝任何堆叠重叠 */
            display: flex;
            align-items: center;
            font-style: italic;      
            white-space: nowrap;     
            overflow: hidden;        
            text-overflow: ellipsis; 
            
            /* 基础状态：默认在滚轴背面，完全透明隐藏 */
            opacity: 0;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1), opacity 1s ease, color 1s ease;
        }

        /* 🔮 3D 级联状态机：完全保留上一版你最满意的震撼空间轴度 */
        
        /* Level 0: 正中心（第 0 层）- 离用户最近，完全聚焦 */
        .scrolling-item.level-0 {
            opacity: 0.98;
            color: #1A1A1A;
            transform: rotateX(0deg) translateZ(100px); 
        }

        /* Level 1: 上下第一层（距离中心±1行）- 微微躺倒，颜色变灰 */
        .scrolling-item.level-1-up {
            opacity: 0.55;
            color: #666666;
            transform: rotateX(28deg) translateZ(60px) translateY(-5px); 
        }
        .scrolling-item.level-1-down {
            opacity: 0.55;
            color: #666666;
            transform: rotateX(-28deg) translateZ(60px) translateY(5px); 
        }

        /* Level 2: 上下第二层（距离中心±2行）- 深度躺倒，濒临隐没（5行必备边缘层） */
        .scrolling-item.level-2-up {
            opacity: 0.18;
            color: #999999;
            transform: rotateX(54deg) translateZ(10px) translateY(-12px) scale(0.95); 
        }
        .scrolling-item.level-2-down {
            opacity: 0.18;
            color: #999999;
            transform: rotateX(-54deg) translateZ(10px) translateY(12px) scale(0.95); 
        }

        @media (max-width: 640px) {
            .main-container {
                font-size: 1.1rem;   
            }
        }
    </style>
</head>
<body>

    <main class="main-container">
        <div class="fixed-text">You are</div>

        <div class="scroll-window">
            <div class="scrolling-track" id="vibeTrack">
                </div>
        </div>
    </main>

    <script>
        // 单行治愈系英文文案库
        const SUB_PHRASES = [
            "enough, just as you are.",
            "doing better than you think.",
            "exactly where you need to be.",
            "growing at your own pace.",
            "allowed to take a break.",
            "the author of your own story.",
            "braver than you feel right now.",
            "capable of amazing things.",
            "deserving of inner peace.",
            "not defined by your past.",
            "the light in someone's dark.",
            "unfolding beautifully every day.",
            "stronger than your deepest fear.",
            "perfectly unique in your way.",
            "allowed to say no today.",
            "creating a life that feels good.",
            "closer to your dreams now.",
            "always worthy of real love.",
            "making real progress every day.",
            "the magic this world needs."
        ];

        const track = document.getElementById('vibeTrack');
        let currentIndex = 0;
        let domItems = [];

        function initScroller() {
            // 三倍拼接，确保上下无论怎么滚，都有至少 2 行作为圆柱体垫底露出
            const triplePhrases = [...SUB_PHRASES, ...SUB_PHRASES, ...SUB_PHRASES];
            currentIndex = SUB_PHRASES.length;

            track.innerHTML = triplePhrases.map((phrase) => `
                <div class="scrolling-item">
                    ${phrase}
                </div>
            `).join('');

            domItems = Array.from(track.getElementsByClassName('scrolling-item'));
            
            window.addEventListener('resize', updateLayout);
            updateLayout(); 

            // 每 3.5 秒如同闹钟滚轮般清脆地转动一格
            setInterval(nextSlide, 3500);
        }

        function updateLayout() {
            if (domItems.length === 0) return;

            const itemHeightPX = domItems[0].offsetHeight;
            
            // 3D 滚轴中心点对齐算法
            const targetY = -((currentIndex + 0.5) * itemHeightPX);
            track.style.transform = `translateY(${targetY}px)`;

            // 5行 3D 空间立体级联渲染核心
            domItems.forEach((item, idx) => {
                item.className = 'scrolling-item';
                const distance = idx - currentIndex;

                if (distance === 0) {
                    item.classList.add('level-0');
                } 
                else if (distance === -1) {
                    item.classList.add('level-1-up');
                } 
                else if (distance === 1) {
                    item.classList.add('level-1-down');
                } 
                else if (distance === -2) {
                    item.classList.add('level-2-up');
                } 
                else if (distance === 2) {
                    item.classList.add('level-2-down');
                }
            });
        }

        function nextSlide() {
            currentIndex++;
            updateLayout();

            // 无缝无感瞬间复位机制
            if (currentIndex === SUB_PHRASES.length * 2) {
                setTimeout(() => {
                    track.style.transition = 'none';
                    currentIndex = SUB_PHRASES.length;
                    updateLayout();
                    track.offsetHeight; // 迫使强制浏览器重绘
                    track.style.transition = 'transform 1.2s cubic-bezier(0.65, 0, 0.35, 1)';
                }, 1200);
            }
        }

        initScroller();
    </script>
</body>
</html>
