<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are — Premium Interactive 3D Roller</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: #FAFAFA; /* 温暖的燕麦白 */
            color: #1A1A1A;
            min-height: 100vh;
            display: flex;
            align-items: center;     /* 垂直居中 */
            justify-content: center;  /* 水平居中 */
            padding: 20px;
            overflow: hidden;
        }

        /* 核心布局容器 */
        .main-container {
            display: flex;
            flex-direction: row;     
            align-items: center;     
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            font-size: clamp(1.4rem, 3.6vw, 2.6rem); /* 黄金字号 */
            line-height: 1.2;
        }

        /* 左侧固定锚点 */
        .fixed-text {
            width: 28%; /* 28% 黄金占比 */
            text-align: right;
            font-weight: 500;
            padding-right: 6%; /* 优雅隔离带 */      
            white-space: nowrap;     
        }

        /* 右侧 3D 滚轴可视窗口 */
        .scroll-window {
            width: 72%; /* 72% 黄金占比 */
            text-align: left;
            position: relative;
            
            /* 🔒 完美保留：彻底放行左右，允许 3D 形变的字母自由伸展，根治切头 */
            overflow: visible; 
            
            height: 8.2em; /* 🔒 完美保留：5行显示高度 */          
            display: flex;
            align-items: center;
            
            /* 开启真 3D 空间硬件加速透视 */
            perspective: 1200px;
            perspective-origin: left center;

            /* 上下边缘消散遮罩 */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            
            /* 个性化鼠标，暗示此处有极高级的滚动选择交互 */
            cursor: ns-resize;
        }

        /* 滚轴总轨道 */
        .scrolling-track {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: absolute;
            left: 0;
            top: 50%; 
            transform-style: preserve-3d; /* 激活真 3D 渲染 */
            
            /* 1.2s 的 cubic-bezier，确保无论是自动滚还是被手动拨动，都自带高级的苹果风阻尼缓动 */
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        /* 滚轴单行容器 */
        .scrolling-item {
            width: 100%;
            height: 1.6em; /* 固定每行高度 */
            display: flex;
            align-items: center;
            font-style: italic;      
            white-space: nowrap;     
            overflow: hidden;        
            text-overflow: ellipsis; 
            
            /* 基础状态：背部隐藏 */
            opacity: 0;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1), opacity 1s ease, color 1s ease;
            
            /* 禁止文字被鼠标误选中导致破坏整体视觉氛围 */
            user-select: none;
        }

        /* 🔮 5行真3D级联状态机 */
        .scrolling-item.level-0 {
            opacity: 0.98;
            color: #1A1A1A;
            transform: rotateX(0deg) translateZ(100px); 
        }

        .scrolling-item.level-1-up {
            opacity: 0.55;
            color: #666666;
            transform: rotateX(28deg) translateZ(60px) translateY(-5px); 
        }
        .scrolling-item.level-1-down {
            opacity: 0.55;
            color: #666666;
            transform: rotateX(-28deg) translateZ(60px) translateY(5px); 
        }

        .scrolling-item.level-2-up {
            opacity: 0.18;
            color: #999999;
            transform: rotateX(54deg) translateZ(10px) translateY(-12px) scale(0.95); 
        }
        .scrolling-item.level-2-down {
            opacity: 0.18;
            color: #999999;
            transform: rotateX(-54deg) translateZ(10px) translateY(12px) scale(0.95); 
        }

        @media (max-width: 640px) {
            .main-container {
                font-size: 1.1rem;   
            }
        }
    </style>
</head>
<body>

    <main class="main-container">
        <div class="fixed-text">You are</div>

        <div class="scroll-window" id="scrollWindow">
            <div class="scrolling-track" id="vibeTrack">
                </div>
        </div>
    </main>

    <script>
        const SUB_PHRASES = [
            "enough, just as you are.",
            "doing better than you think.",
            "exactly where you need to be.",
            "growing at your own pace.",
            "allowed to take a break.",
            "the author of your own story.",
            "braver than you feel right now.",
            "capable of amazing things.",
            "deserving of inner peace.",
            "not defined by your past.",
            "the light in someone's dark.",
            "unfolding beautifully every day.",
            "stronger than your deepest fear.",
            "perfectly unique in your way.",
            "allowed to say no today.",
            "creating a life that feels good.",
            "closer to your dreams now.",
            "always worthy of real love.",
            "making real progress every day.",
            "the magic this world needs."
        ];

        const windowEl = document.getElementById('scrollWindow');
        const track = document.getElementById('vibeTrack');
        let currentIndex = 0;
        let domItems = [];
        
        let autoFlipTimer = null; // 自动轮播计时器
        let isThrottled = false;   // 核心阀门：滚轮物理节流防抖锁

        function initScroller() {
            // 三倍拼接，确保在手动上下滚动穿梭时有绝对充足的圆柱曲面垫底
            const triplePhrases = [...SUB_PHRASES, ...SUB_PHRASES, ...SUB_PHRASES];
            currentIndex = SUB_PHRASES.length;

            track.innerHTML = triplePhrases.map((phrase) => `
                <div class="scrolling-item">
                    ${phrase}
                </div>
            `).join('');

            domItems = Array.from(track.getElementsByClassName('scrolling-item'));
            
            window.addEventListener('resize', updateLayout);
            updateLayout(); 

            // 1. 开启初始状态的安静自动轮播（每 3.5 秒一格）
            startAutoplay();

            // 2. 鼠标悬停监听：一进来就停止自动，一离开就启动自动
            windowEl.addEventListener('mouseenter', () => {
                stopAutoplay();
            });
            windowEl.addEventListener('mouseleave', () => {
                startAutoplay();
            });

            // 3. 注入全新升级的硬核滚轮防抖拦截系统
            windowEl.addEventListener('wheel', handleMouseWheel, { passive: false });
        }

        // 🌟 3D 滚轴中心点对齐与 5行 立体状态级联
        function updateLayout() {
            if (domItems.length === 0) return;

            const itemHeightPX = domItems[0].offsetHeight;
            const targetY = -((currentIndex + 0.5) * itemHeightPX);
            track.style.transform = `translateY(${targetY}px)`;

            domItems.forEach((item, idx) => {
                item.className = 'scrolling-item';
                const distance = idx - currentIndex;

                if (distance === 0) {
                    item.classList.add('level-0');
                } 
                else if (distance === -1) {
                    item.classList.add('level-1-up');
                } 
                else if (distance === 1) {
                    item.classList.add('level-1-down');
                } 
                else if (distance === -2) {
                    item.classList.add('level-2-up');
                } 
                else if (distance === 2) {
                    item.classList.add('level-2-down');
                }
            });
        }

        function startAutoplay() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
            autoFlipTimer = setInterval(() => {
                moveRoller(1); // 自动状态下保持顺时针向前推进一格
            }, 3500);
        }

        function stopAutoplay() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
        }

        // 驱动索引变更的通用控制机（包含越界无感复位逻辑）
        function moveRoller(direction) {
            currentIndex += direction;
            updateLayout();

            const len = SUB_PHRASES.length;

            // 情况 A：向下滚穿了第二组（超过 20*2） -> 动画结束后在后台瞬间悄悄切回第一组的相同位置 (20)
            if (currentIndex >= len * 2) {
                setTimeout(() => {
                    track.style.transition = 'none';
                    currentIndex = len;
                    updateLayout();
                    track.offsetHeight; // 强制重绘
                    track.style.transition = 'transform 1.2s cubic-bezier(0.65, 0, 0.35, 1)';
                }, 1200);
            }
            // 情况 B：向上滚穿了第一组的上限（低于 20） -> 动画结束后在后台瞬间悄悄切换回第二组的末尾相同位置
            if (currentIndex < len) {
                setTimeout(() => {
                    track.style.transition = 'none';
                    currentIndex = len * 2 - 1;
                    updateLayout();
                    track.offsetHeight; 
                    track.style.transition = 'transform 1.2s cubic-bezier(0.65, 0, 0.35, 1)';
                }, 1200);
            }
        }

        // 🌟 核心优化：智能防抖与精准选句函数
        function handleMouseWheel(event) {
            // 劫持并禁止浏览器本身的页面全局网页滚动
            event.preventDefault();

            // 🔒 节流锁：如果上一次拨动引起的 3D 动画还未完成，直接拒绝本次高频突发事件
            if (isThrottled) return;

            isThrottled = true;

            // 捕捉滚轮的绝对物理手势
            if (event.deltaY > 0) {
                // 手指往下拉（滚轮向下），代表想滚动到下一句
                moveRoller(1);
            } else if (event.deltaY < 0) {
                // 手指往上拉（滚轮向上），代表想回退到上一句
                moveRoller(-1);
            }

            // 350ms 的极速冷却锁。这可以让你在手动选句时，手指既能获得极为清脆、干练的“一格一卡位”顺从感，
            // 同时也允许你以适当的频率流畅地翻页，再也不会产生乱闪和飞速空转的 bug。
            setTimeout(() => {
                isThrottled = false;
            }, 350);
        }

        initScroller();
    </script>
</body>
</html>
